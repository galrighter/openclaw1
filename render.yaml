services:
  - type: web
    name: openclaw
    runtime: docker
    plan: standard
    dockerCommand: node -e "const fs=require('fs'),d=process.env.OPENCLAW_STATE_DIR||'/data/.openclaw';fs.mkdirSync(d,{recursive:true});const f=d+'/openclaw.json';let c={};try{c=JSON.parse(fs.readFileSync(f,'utf8'))}catch{};c.gateway={...c.gateway,controlUi:{...c.gateway?.controlUi,dangerouslyAllowHostHeaderOriginFallback:true}};fs.writeFileSync(f,JSON.stringify(c,null,2));require('child_process').execFileSync('node',['openclaw.mjs','gateway','--allow-unconfigured','--bind','lan'],{stdio:'inherit'})"
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
